name: Preprocessing Automation

on:
  push:
    branches: [main]
    paths:
      - 'preprocessing/**'
  workflow_dispatch:

permissions:
  contents: write
  
jobs:
  preprocess:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn

      - name: Run preprocessing automation
        run: |
          cd preprocessing
          python automate_MuhammadIzzulIslam.py

      - name: Commit and push preprocessed dataset
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add preprocessing/credit_scoring_preprocessing/
          git diff --staged --quiet || git commit -m "Automated: update preprocessed dataset [skip ci]"
          git push
